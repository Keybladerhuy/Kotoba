<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Study</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>日本語 Study</h1>
      <div class="header-actions">
        <nav id="nav"></nav>
        <button class="stats-toggle" id="stats-toggle" title="View progress">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="4" y1="14" x2="4" y2="8"/>
            <line x1="9" y1="14" x2="9" y2="4"/>
            <line x1="14" y1="14" x2="14" y2="10"/>
          </svg>
        </button>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
          <span id="theme-icon">&#9790;</span>
        </button>
      </div>
    </header>
    <main id="view"></main>
  </div>

  <!-- Home View -->
  <template id="tpl-home">
    <div class="home">
      <div class="level-selector">
        <span class="level-label">JLPT Level</span>
        <div class="pill-toggle pill-toggle-5" id="level-toggle">
          <input type="radio" name="jlpt-level" id="level-n1" value="n1">
          <label for="level-n1">N1</label>
          <input type="radio" name="jlpt-level" id="level-n2" value="n2">
          <label for="level-n2">N2</label>
          <input type="radio" name="jlpt-level" id="level-n3" value="n3">
          <label for="level-n3">N3</label>
          <input type="radio" name="jlpt-level" id="level-n4" value="n4">
          <label for="level-n4">N4</label>
          <input type="radio" name="jlpt-level" id="level-n5" value="n5">
          <label for="level-n5">N5</label>
        </div>
      </div>

      <div class="deck-cards stagger">
        <div class="deck-card deck-card-kanji" data-action="study-kanji">
          <div class="kanji-bg-char">漢</div>
          <div class="deck-header-row">
            <div class="deck-icon-kanji">漢</div>
            <h2>Kanji</h2>
          </div>
          <div class="kanji-ticker" id="kanji-ticker">
            <span class="kanji-ticker-track" id="kanji-ticker-track"></span>
          </div>
          <div class="deck-progress-unit">
            <div class="deck-progress-labels">
              <span id="kanji-known">— mastered</span>
              <span id="kanji-total">— total</span>
            </div>
            <div class="deck-progress-bar-wrap">
              <div class="deck-progress-fill" id="kanji-progress-bar"></div>
            </div>
          </div>
          <button class="deck-cta" data-action="study-kanji">Start Studying →</button>
        </div>
        <div class="deck-card" data-action="study-vocab">
          <div class="deck-icon">語</div>
          <h2>Vocabulary</h2>
          <div class="deck-stats">
            <span class="badge" id="vocab-known">— mastered</span>
            <span class="badge badge-secondary" id="vocab-total">— total</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="vocab-progress-bar"></div>
          </div>
          <div class="deck-buttons">
            <button class="btn btn-primary" data-action="study-vocab">Study</button>
          </div>
        </div>
      </div>

      <div class="settings-panel">
        <h3>Settings</h3>
        <div class="setting-row">
          <label for="quiz-size">Session size</label>
          <select id="quiz-size">
            <option value="5" selected>5 cards</option>
            <option value="10">10 cards</option>
            <option value="25">25 cards</option>
            <option value="50">50 cards</option>
            <option value="0">All cards</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="filter-mode">Show cards</label>
          <select id="filter-mode">
            <option value="all">All cards</option>
            <option value="notmastered">Not mastered</option>
            <option value="unseen">Unseen only</option>
          </select>
        </div>
        <button class="btn btn-danger" id="reset-progress">Reset All Progress</button>
      </div>
    </div>
  </template>

  <!-- Flashcard View -->
  <template id="tpl-flashcard">
    <div class="flashcard-view">
      <div class="quiz-header">
        <button class="btn btn-ghost" data-action="home">&larr; Back</button>
        <div class="quiz-info">
          <span id="card-counter">1 / 25</span>
          <div class="mini-progress-bar-wrap">
            <div class="mini-progress-bar" id="quiz-progress-bar"></div>
          </div>
        </div>
        <div class="score-display">
          <span class="score-correct" id="score-correct">0</span>
          <span class="score-sep">/</span>
          <span class="score-total" id="score-seen">0</span>
        </div>
      </div>

      <div class="card-area">
        <div class="flashcard" id="flashcard">
          <div class="card-inner" id="card-inner">
            <div class="card-front" id="card-front"></div>
            <div class="card-back" id="card-back"></div>
          </div>
        </div>
      </div>

      <div class="card-actions" id="card-actions-flip">
        <p class="hint">Press <kbd>Space</kbd> or tap card to flip</p>
        <button class="btn btn-secondary btn-lg" id="flip-btn">Flip Card</button>
      </div>

      <div class="card-actions hidden" id="card-actions-grade">
        <p class="hint">Press <kbd>&larr;</kbd> Wrong &nbsp;|&nbsp; <kbd>&rarr;</kbd> Correct</p>
        <div class="grade-buttons">
          <button class="btn btn-wrong btn-lg" id="wrong-btn">&#10007; Wrong</button>
          <button class="btn btn-correct btn-lg" id="correct-btn">&#10003; Correct</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Quiz View (Multiple Choice) -->
  <template id="tpl-quiz">
    <div class="quiz-view">
      <div class="quiz-header">
        <button class="btn btn-ghost" data-action="home">&larr; Back</button>
        <div class="quiz-info">
          <span id="quiz-card-counter">1 / 25</span>
          <div class="mini-progress-bar-wrap">
            <div class="mini-progress-bar" id="quiz-mc-progress-bar"></div>
          </div>
        </div>
        <div class="score-display">
          <span class="score-correct" id="quiz-score-correct">0</span>
          <span class="score-sep">/</span>
          <span class="score-total" id="quiz-score-seen">0</span>
        </div>
      </div>

      <div class="quiz-prompt-area">
        <div class="quiz-prompt-sub" id="quiz-prompt-sub">Kanji</div>
        <div class="quiz-prompt-text" id="quiz-prompt"></div>
      </div>

      <div class="quiz-choices" id="quiz-choices"></div>

      <p class="hint" id="quiz-hint">Press 1-4 to choose</p>
    </div>
  </template>

  <!-- Typing View -->
  <template id="tpl-typing">
    <div class="typing-view">
      <div class="quiz-header">
        <button class="btn btn-ghost" data-action="home">&larr; Back</button>
        <div class="quiz-info">
          <span id="typing-card-counter">1 / 25</span>
          <div class="mini-progress-bar-wrap">
            <div class="mini-progress-bar" id="typing-progress-bar"></div>
          </div>
        </div>
        <div class="score-display">
          <span class="score-correct" id="typing-score-correct">0</span>
          <span class="score-sep">/</span>
          <span class="score-total" id="typing-score-seen">0</span>
        </div>
      </div>

      <div class="quiz-prompt-area">
        <div class="quiz-prompt-sub" id="typing-prompt-sub">Kanji &middot; Type meaning &amp; reading</div>
        <div class="quiz-prompt-text" id="typing-prompt"></div>
      </div>

      <div class="typing-input-area">
        <div class="typing-dual-inputs">
          <div class="typing-field">
            <label class="typing-field-label" for="typing-meaning">Meaning</label>
            <div class="typing-input-wrapper">
              <input type="text" class="typing-input" id="typing-meaning" autocomplete="off" autocapitalize="off" spellcheck="false">
              <div class="typing-ghost" id="typing-ghost-meaning"></div>
            </div>
          </div>
          <div class="typing-field">
            <label class="typing-field-label" for="typing-reading">Reading</label>
            <div class="typing-input-wrapper">
              <input type="text" class="typing-input" id="typing-reading" autocomplete="off" autocapitalize="off" spellcheck="false">
              <div class="typing-ghost" id="typing-ghost-reading"></div>
            </div>
          </div>
        </div>
        <button class="btn btn-primary" id="typing-submit">Submit</button>
      </div>

      <div class="typing-feedback" id="typing-feedback"></div>
      <p class="hint" id="typing-hint">Type meaning &amp; reading, then press Enter</p>
    </div>
  </template>

  <!-- Staged Typing View -->
  <template id="tpl-staged-typing">
    <div class="staged-typing-view">
      <div class="quiz-header">
        <button class="btn btn-ghost" data-action="home">&larr; Back</button>
        <div class="quiz-info">
          <span id="st-card-counter">1 / 25</span>
          <div class="mini-progress-bar-wrap">
            <div class="mini-progress-bar" id="st-progress-bar"></div>
          </div>
        </div>
        <div class="score-display">
          <span class="score-correct" id="st-score-correct">0</span>
          <span class="score-sep">/</span>
          <span class="score-total" id="st-score-seen">0</span>
        </div>
      </div>

      <div class="quiz-prompt-area">
        <div class="quiz-prompt-sub" id="st-prompt-sub"></div>
        <div class="quiz-prompt-text" id="st-prompt"></div>
      </div>

      <div class="st-fields" id="st-fields"></div>

      <div class="st-compounds hidden" id="st-compounds">
        <div class="st-compounds-label">Compounds</div>
        <div class="st-compounds-list" id="st-compounds-list"></div>
      </div>

      <div class="typing-input-area">
        <button class="btn btn-primary" id="st-submit">Submit</button>
      </div>

      <div class="typing-feedback" id="st-feedback"></div>
      <p class="hint" id="st-hint">Type your answers, then press Enter</p>
    </div>
  </template>

  <!-- Stats View -->
  <template id="tpl-stats">
    <div class="stats-view">
      <div class="stats-header">
        <button class="btn btn-ghost" data-action="home">&larr; Back</button>
        <h2>Progress</h2>
        <div></div>
      </div>

      <div class="stats-overview stagger">
        <div class="stats-card">
          <h3>Kanji</h3>
          <div class="donut-chart" id="stats-kanji-donut"></div>
          <div class="donut-legend">
            <span class="legend-item legend-mastered"><span class="legend-dot"></span> Mastered <strong id="stats-kanji-mastered">0</strong></span>
            <span class="legend-item legend-inprogress"><span class="legend-dot"></span> In Progress <strong id="stats-kanji-inprogress">0</strong></span>
            <span class="legend-item legend-new"><span class="legend-dot"></span> Unseen <strong id="stats-kanji-new">0</strong></span>
          </div>
        </div>

        <div class="stats-card">
          <h3>Vocabulary</h3>
          <div class="donut-chart" id="stats-vocab-donut"></div>
          <div class="donut-legend">
            <span class="legend-item legend-mastered"><span class="legend-dot"></span> Mastered <strong id="stats-vocab-mastered">0</strong></span>
            <span class="legend-item legend-inprogress"><span class="legend-dot"></span> In Progress <strong id="stats-vocab-inprogress">0</strong></span>
            <span class="legend-item legend-new"><span class="legend-dot"></span> Unseen <strong id="stats-vocab-new">0</strong></span>
          </div>
        </div>

        <div class="stats-card stats-card-wide">
          <div class="stats-metric-row">
            <div class="stat-block">
              <div class="stat-number" id="stats-accuracy">&mdash;</div>
              <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-block">
              <div class="stat-number" id="stats-studied">0</div>
              <div class="stat-label">Studied</div>
            </div>
          </div>
        </div>
      </div>

      <div class="stats-card">
        <h3>Hardest Items</h3>
        <div class="hardest-list" id="stats-hardest"></div>
      </div>

      <div class="stats-card">
        <div class="item-list-controls">
          <h3>All Items</h3>
          <div class="item-list-filters">
            <select id="stats-type-filter">
              <option value="all">All types</option>
              <option value="kanji">Kanji</option>
              <option value="vocab">Vocabulary</option>
            </select>
            <select id="stats-status-filter">
              <option value="studied">Studied</option>
              <option value="mastered">Mastered</option>
              <option value="in-progress">In Progress</option>
              <option value="unseen">Unseen</option>
              <option value="all">All</option>
            </select>
            <select id="stats-sort">
              <option value="last-seen">Last Seen</option>
              <option value="accuracy-asc">Accuracy (low first)</option>
              <option value="accuracy-desc">Accuracy (high first)</option>
              <option value="name">Name</option>
            </select>
          </div>
        </div>
        <div class="item-list-scroll" id="stats-item-list"></div>
      </div>
    </div>
  </template>

  <!-- Summary View -->
  <template id="tpl-summary">
    <div class="summary-view">
      <div class="summary-celebration" id="summary-celebration"></div>
      <h2>Session Complete</h2>
      <div class="summary-stats">
        <div class="stat-block">
          <div class="stat-number" id="sum-correct"></div>
          <div class="stat-label">Correct</div>
        </div>
        <div class="stat-block">
          <div class="stat-number" id="sum-wrong"></div>
          <div class="stat-label">Wrong</div>
        </div>
        <div class="stat-block">
          <div class="stat-number" id="sum-total"></div>
          <div class="stat-label">Total</div>
        </div>
      </div>
      <div class="summary-bar-wrap">
        <div class="summary-bar" id="summary-bar"></div>
      </div>
      <p class="summary-pct" id="summary-pct"></p>
      <div class="summary-actions">
        <button class="btn btn-primary btn-lg" id="study-again-btn">Study Again</button>
        <button class="btn btn-ghost btn-lg" data-action="home">Home</button>
      </div>
    </div>
  </template>

  <script src="js/theme.js"></script>
  <script src="js/data.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/session.js"></script>
  <script src="js/flashcard.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/emoji-fx.js"></script>
  <script src="js/typing.js"></script>
  <script src="js/staged-typing.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
