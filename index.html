<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Study</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>日本語 Study</h1>
      <nav id="nav"></nav>
    </header>
    <main id="view"></main>
  </div>

  <!-- Home View -->
  <template id="tpl-home">
    <div class="home">
      <div class="deck-cards">
        <div class="deck-card" data-action="study-kanji">
          <div class="deck-icon">漢</div>
          <h2>Kanji</h2>
          <div class="deck-stats">
            <span class="badge" id="kanji-known">— known</span>
            <span class="badge badge-secondary" id="kanji-total">— total</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="kanji-progress-bar"></div>
          </div>
          <div class="deck-buttons">
            <button class="btn btn-primary" data-action="study-kanji">Study</button>
            <button class="btn btn-secondary" data-action="review-kanji">Review Due <span class="due-badge" id="kanji-due">0</span></button>
          </div>
        </div>
        <div class="deck-card" data-action="study-vocab">
          <div class="deck-icon">語</div>
          <h2>Vocabulary</h2>
          <div class="deck-stats">
            <span class="badge" id="vocab-known">— known</span>
            <span class="badge badge-secondary" id="vocab-total">— total</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="vocab-progress-bar"></div>
          </div>
          <div class="deck-buttons">
            <button class="btn btn-primary" data-action="study-vocab">Study</button>
            <button class="btn btn-secondary" data-action="review-vocab">Review Due <span class="due-badge" id="vocab-due">0</span></button>
          </div>
        </div>
      </div>

      <div class="settings-panel">
        <h3>Settings</h3>
        <div class="setting-row">
          <label for="quiz-size">Quiz size</label>
          <select id="quiz-size">
            <option value="10">10 cards</option>
            <option value="25" selected>25 cards</option>
            <option value="50">50 cards</option>
            <option value="0">All cards</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="filter-mode">Show cards</label>
          <select id="filter-mode">
            <option value="all">All cards</option>
            <option value="new">New only</option>
            <option value="learning">Learning only</option>
            <option value="due">New + Learning</option>
            <option value="srs">SRS Due</option>
          </select>
        </div>
        <button class="btn btn-danger" id="reset-progress">Reset All Progress</button>
      </div>
    </div>
  </template>

  <!-- Flashcard View -->
  <template id="tpl-flashcard">
    <div class="flashcard-view">
      <div class="quiz-header">
        <button class="btn btn-ghost" data-action="home">← Back</button>
        <div class="quiz-info">
          <span id="card-counter">1 / 25</span>
          <div class="mini-progress-bar-wrap">
            <div class="mini-progress-bar" id="quiz-progress-bar"></div>
          </div>
        </div>
        <div class="score-display">
          <span class="score-correct" id="score-correct">0</span>
          <span class="score-sep">/</span>
          <span class="score-total" id="score-seen">0</span>
        </div>
      </div>

      <div class="card-area">
        <div class="flashcard" id="flashcard">
          <div class="card-inner" id="card-inner">
            <div class="card-front" id="card-front"></div>
            <div class="card-back" id="card-back"></div>
          </div>
        </div>
      </div>

      <div class="card-actions" id="card-actions-flip">
        <p class="hint">Press <kbd>Space</kbd> or tap card to flip</p>
        <button class="btn btn-secondary btn-lg" id="flip-btn">Flip Card</button>
      </div>

      <div class="card-actions hidden" id="card-actions-grade">
        <p class="hint">Press <kbd>←</kbd> Wrong &nbsp;|&nbsp; <kbd>→</kbd> Correct</p>
        <div class="grade-buttons">
          <button class="btn btn-wrong btn-lg" id="wrong-btn">✗ Wrong</button>
          <button class="btn btn-correct btn-lg" id="correct-btn">✓ Correct</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Summary View -->
  <template id="tpl-summary">
    <div class="summary-view">
      <h2>Session Complete</h2>
      <div class="summary-stats">
        <div class="stat-block">
          <div class="stat-number" id="sum-correct"></div>
          <div class="stat-label">Correct</div>
        </div>
        <div class="stat-block">
          <div class="stat-number" id="sum-wrong"></div>
          <div class="stat-label">Wrong</div>
        </div>
        <div class="stat-block">
          <div class="stat-number" id="sum-total"></div>
          <div class="stat-label">Total</div>
        </div>
      </div>
      <div class="summary-bar-wrap">
        <div class="summary-bar" id="summary-bar"></div>
      </div>
      <p class="summary-pct" id="summary-pct"></p>
      <div class="summary-actions">
        <button class="btn btn-primary btn-lg" id="study-again-btn">Study Again</button>
        <button class="btn btn-ghost btn-lg" data-action="home">Home</button>
      </div>
    </div>
  </template>

  <script src="js/data.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/flashcard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
