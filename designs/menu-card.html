<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kanji Card Redesign</title>
<style>
  body {
    background: #0b1220;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
  }

  .card {
    width: 320px;
    padding: 20px;
    border-radius: 20px;
    background: linear-gradient(145deg, #0f1a2e, #0a1324);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }

  /* Floating big kanji */
  .kanji-bg {
    position: absolute;
    top: -20px;
    right: -10px;
    font-size: 120px;
    opacity: 0.05;
    font-weight: bold;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .kanji-icon {
    font-size: 42px;
    background: linear-gradient(135deg, #ffb347, #ff7a18);
    padding: 10px 14px;
    border-radius: 12px;
    font-weight: bold;
    box-shadow: 0 4px 12px rgba(255,122,24,0.4);
  }

  .title {
    font-size: 20px;
    font-weight: 600;
  }

  /* Looping mastered kanji */
  .ticker {
    margin: 14px 0;
    overflow: hidden;
    white-space: nowrap;
    position: relative;
  }

  .ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 10s linear infinite;
    opacity: 0.7;
  }

  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  /* Progress */
  .progress-wrapper {
    margin-top: 10px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 6px;
  }

  .progress-bar {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 20%;
    background: linear-gradient(90deg, #00ffa3, #00c3ff);
    border-radius: 10px;
    position: relative;
  }

  .progress-fill::after {
    content: "";
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,255,255,0.8);
  }

  /* CTA */
  .cta {
    margin-top: 18px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg, #ff7a18, #ffb347);
    color: white;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(255,122,24,0.4);
  }

  .cta:active {
    transform: scale(0.97);
  }

</style>
</head>
<body>

<div class="card">
  <div class="kanji-bg">漢</div>

  <div class="header">
    <div class="kanji-icon">漢</div>
    <div class="title">Kanji</div>
  </div>

  <div class="ticker">
    <span>日 月 火 水 木 金 土 人 山 川 田 空 雨 車 魚 学 校 生 先 年 時 間</span>
  </div>

  <div class="progress-wrapper">
    <div class="progress-label">
      <div>1 mastered</div>
      <div>96 total</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <button class="cta">Start Studying →</button>
</div>

</body>
</html>
